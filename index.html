<!DOCTYPE html>
<html>
<head>
  <title>My Products</title>
  <style>
    table {
         border-collapse: separate;
          font-family: Arial, sans-serif;
         }
    th, td {
         border: 1px solid #999; 
         padding: 6px 12px;
         }
  </style>
</head>
<body>
  <h1><span class="highlight">Products</span></h1>
  <marquee><span style="color:yellow; ">list</span></marquee>

  <table id="data">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price ($)</th>
        </tr>

    <tr><td>1</td><td>Wireless Mouse</td><td>15.00</td></tr>
    <tr><td>2</td><td>Laptop Stand</td><td>29.99</td></tr>
    <tr><td>3</td><td>USB Cable</td><td>9.99</td></tr>

  </table>
</body>
</html>
